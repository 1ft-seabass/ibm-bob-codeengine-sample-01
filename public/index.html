<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IBM Code Engine - Hono Base</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">IBM Code Engine - Hono Base</h1>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">🚀 サーバー</h5>
              <p class="card-text">Node.js + Hono フレームワークで動作しています。</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">☁️ ホスティング</h5>
              <p class="card-text">IBM Cloud Code Engine 上で稼働しています。</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">🔌 API</h5>
              <p class="card-text">
                <code>/api/hello</code> にアクセスすると JSON レスポンスが返ります。
              </p>
              <a href="/api/hello" class="btn btn-primary btn-sm mt-2" target="_blank">試してみる</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
